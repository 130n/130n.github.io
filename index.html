<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>130n</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #da9926;
      --muted:  #939393;
      --bg:     #111110;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    @media (min-width: 900px) { html { font-size: 20px; } }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: #eeeeff;
      display: flex;
      align-items: center;
      min-height: 100%;
      padding: clamp(2rem, 7vw, 6rem);
    }

    main { width: 100%; max-width: 40rem; margin: 0 auto; }

    .label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.6rem;
    }

    ul { list-style: none; display: flex; flex-direction: column; gap: 1.1rem; }

    li a {
      display: flex;
      align-items: baseline;
      gap: 0.7rem;
      text-decoration: none;
      color: inherit;
      transition: color 0.15s;
    }
    li a:hover { color: var(--accent); }
    li a:hover .arrow { transform: translateX(3px); }

    .arrow {
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .item-title { display: block; font-size: 1.3rem; font-weight: 600; letter-spacing: -0.02em; }
    .item-meta  { display: block; font-size: 0.85rem; color: var(--muted); font-weight: 300; margin-top: 0.15rem; }
  </style>
</head>
<body>
  <main>
    <p class="label">Stuff:</p>
    <ul>
      <li>
        <a href="camfil-2026.html">
          <span class="arrow">›</span>
          <span>
            <span class="item-title">Hur vi bygger AI-agenter med AI-agenter</span>
            <span class="item-meta">Camfil · agentisk utveckling · 2026</span>
          </span>
        </a>
      </li>
      <li>
        <a href="presentation-template.html">
          <span class="arrow">›</span>
          <span>
            <span class="item-title">Presentationsmall</span>
            <span class="item-meta">Alla byggblock, redo att fyllas i</span>
          </span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
